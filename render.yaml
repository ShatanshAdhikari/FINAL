# Render blueprint — backend web service (FastAPI) for GetFit.
# Frontend deploys separately on Vercel. Database is Neon Postgres.
#
# After first deploy, set the secret env vars in the Render dashboard
# (marked sync: false below) — they are NOT stored in git.
services:
  - type: web
    name: getfit-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL      # Neon connection string (postgresql://...sslmode=require)
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL      # https://<your-app>.vercel.app
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # SendGrid HTTP API — the backend actually used in production. Render
      # blocks outbound SMTP, and unlike Resend a single verified sender is
      # enough (no domain needed). Takes priority over the SMTP_* vars above.
      - key: SENDGRID_API_KEY  # SG.… key with Mail Send scope only
        sync: false
      - key: SENDGRID_FROM     # must match a verified sender, e.g. GetFit <you@gmail.com>
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: USDA_API_KEY
        sync: false
