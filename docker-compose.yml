services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "sqlite:////data/getfit.db"
    volumes:
      - getfit_data:/data
      # Mount the local ML dataset (gitignored, not baked into the image) so the
      # container trains/reports on real data. Read-only — retrain writes only the .pkl.
      - ./backend/app/ml/data:/app/app/ml/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  getfit_data:
